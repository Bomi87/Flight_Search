<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Airport Schedule Search</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#d7e0ea;
      --text:#1f2d3d;
      --muted:#6b7c93;
      --blue:#4a6fa5;
      --blue-dark:#395782;
      --yellow:#fff55a;
      --btn:#7c8794;
      --btn-dark:#5f6974;
      --dep:#dbeafe;
      --arr:#dcfce7;
      --shadow:0 8px 24px rgba(15,23,42,.08);

      --w-airport:104px;
      --w-filter:104px;
      --w-date:122px;
      --w-time:74px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:4px auto;
      padding:0;
    }

    .toolbar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow);
      padding:8px 10px;
      margin-bottom:8px;
    }

    .toolbar-grid{
      display:grid;
      grid-template-columns:auto auto auto auto;
      gap:8px;
      align-items:end;
      justify-content:start;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:auto auto auto;
      gap:8px;
      align-items:end;
      justify-content:start;
      margin-top:8px;
      padding-top:8px;
      border-top:1px dashed var(--line);
    }

    .field{
      width:fit-content;
      min-width:0;
    }

    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
      line-height:1.2;
      white-space:nowrap;
    }

    .field input,
    .field select{
      height:34px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 8px;
      font-size:13px;
      background:#fff;
      width:auto;
      min-width:0;
    }

    .airport{
      background:var(--yellow) !important;
      font-weight:700;
      text-transform:uppercase;
      width:var(--w-airport);
    }

    .filter-input{
      width:var(--w-filter);
      text-transform:uppercase;
    }

    .dt-row{
      display:grid;
      grid-template-columns:var(--w-date) var(--w-time);
      gap:6px;
      align-items:center;
      width:fit-content;
    }

    .date-fit{
      width:var(--w-date);
      min-width:var(--w-date);
      max-width:var(--w-date);
      text-align:center;
      padding:0 6px !important;
    }

    .time-fit{
      width:var(--w-time);
      min-width:var(--w-time);
      max-width:var(--w-time);
      text-align:center;
      padding:0 6px !important;
    }

    .actions{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
      align-items:center;
      width:fit-content;
    }

    .btn{
      height:32px;
      padding:0 10px;
      border:none;
      border-radius:10px;
      background:var(--btn);
      color:#fff;
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      box-shadow:0 2px 0 rgba(0,0,0,.18);
      white-space:nowrap;
      width:auto;
      min-width:fit-content;
      flex:0 0 auto;
    }

    .btn:hover{background:var(--btn-dark)}
    .btn-primary{background:var(--blue);}
    .btn-primary:hover{background:var(--blue-dark);}

    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .table-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .table-wrap{
      overflow:auto;
      max-height:78vh;
    }

    table{
      width:max-content;
      min-width:100%;
      border-collapse:collapse;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#eef3f8;
      border-bottom:1px solid var(--line);
      padding:4px 3px;
      text-align:center;
      font-size:10px;
      white-space:nowrap;
      line-height:1.05;
    }

    tbody td{
      border-bottom:1px solid #edf2f7;
      padding:3px 3px;
      font-size:10px;
      white-space:nowrap;
      text-align:center;
      line-height:1.05;
    }

    tbody tr:hover{
      background:#f8fbff;
    }

    .tag{
      display:inline-block;
      min-width:24px;
      padding:1px 4px;
      border-radius:999px;
      font-size:9px;
      font-weight:700;
      line-height:1.1;
    }

    .tag.dep{ background:var(--dep); color:#1d4ed8; }
    .tag.arr{ background:var(--arr); color:#15803d; }

    .empty{
      padding:20px 8px;
      text-align:center;
      color:var(--muted);
    }

    .status-error{
      color:#b91c1c;
      font-weight:700;
    }

    .status-ok{
      color:#166534;
      font-weight:700;
    }

    .col-time{min-width:84px;}
    .col-dir{min-width:42px;}
    .col-airline{min-width:64px;}
    .col-flight{min-width:54px;}
    .col-acft{min-width:72px;}
    .col-org{min-width:48px;}
    .col-dst{min-width:48px;}

    @media (max-width: 980px){
      :root{
        --w-airport:100px;
        --w-filter:100px;
        --w-date:100px;
        --w-time:84px;
      }

      .toolbar-grid{
        grid-template-columns:auto auto;
        gap:8px 8px;
        align-items:end;
        justify-content:start;
      }

      .filter-grid{
        grid-template-columns:auto auto;
        gap:8px 8px;
        align-items:end;
        justify-content:start;
      }

      .toolbar-grid .actions,
      .filter-grid .actions{
        grid-column:1 / -1;
      }

      .actions{
        display:flex;
        flex-wrap:nowrap;
        gap:6px;
        overflow-x:auto;
        width:100%;
        padding-bottom:2px;
      }

      .btn{
        height:30px;
        font-size:11px;
        padding:0 10px;
      }

      .field input,
      .field select{
        height:34px;
        font-size:13px;
      }

      .meta{
        font-size:11px;
        gap:6px;
      }

      thead th{
        padding:3px 2px;
        font-size:9px;
      }

      tbody td{
        padding:2px 2px;
        font-size:9px;
      }

      .col-time{min-width:74px;}
      .col-dir{min-width:38px;}
      .col-airline{min-width:56px;}
      .col-flight{min-width:48px;}
      .col-acft{min-width:64px;}
      .col-org{min-width:44px;}
      .col-dst{min-width:44px;}
    }

    @media (max-width: 560px){
      :root{
        --w-airport:96px;
        --w-filter:96px;
        --w-date:94px;
        --w-time:82px;
      }

      .toolbar{
        padding:8px;
      }

      .toolbar-grid{
        grid-template-columns:1fr 1fr;
        grid-template-areas:
          "airport airport"
          "start end"
          "actions actions";
        gap:8px 8px;
        align-items:end;
        justify-content:start;
      }

      .toolbar-grid .field.airport-field{
        grid-area:airport;
      }

      .toolbar-grid .field.start-field{
        grid-area:start;
      }

      .toolbar-grid .field.end-field{
        grid-area:end;
      }

      .toolbar-grid .actions{
        grid-area:actions;
      }

      .filter-grid{
        grid-template-columns:1fr 1fr;
        grid-template-areas:
          "origin destination"
          "filterActions filterActions";
        gap:8px 8px;
        align-items:end;
        justify-content:start;
      }

      .filter-grid .field.origin-field{
        grid-area:origin;
      }

      .filter-grid .field.destination-field{
        grid-area:destination;
      }

      .filter-grid .actions{
        grid-area:filterActions;
      }

      .field{
        width:100%;
      }

      .field input,
      .field select{
        width:100%;
      }

      .airport{
        width:96px;
      }

      .filter-input{
        width:100%;
      }

      .dt-row{
        grid-template-columns:94px 82px;
        gap:6px;
        width:100%;
      }

      .date-fit{
        width:94px;
        min-width:94px;
        max-width:94px;
      }

      .time-fit{
        width:82px;
        min-width:82px;
        max-width:82px;
      }

      .actions{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="toolbar">
      <div class="toolbar-grid">
        <div class="field airport-field">
          <label>공항(ICAO)</label>
          <input id="airport" class="airport" type="text" value="RJTT" maxlength="4" placeholder="RJTT">
        </div>

        <div class="field start-field">
          <label>START (LOCAL)</label>
          <div class="dt-row">
            <input id="startDate" class="date-fit" type="date">
            <select id="startTime" class="time-fit"></select>
          </div>
        </div>

        <div class="field end-field">
          <label>END (LOCAL)</label>
          <div class="dt-row">
            <input id="endDate" class="date-fit" type="date">
            <select id="endTime" class="time-fit"></select>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btnSearch">스케줄 조회</button>
          <button class="btn" id="btnAll">전체</button>
          <button class="btn" id="btnDep">DEP</button>
          <button class="btn" id="btnArr">ARR</button>
        </div>
      </div>

      <div class="filter-grid">
        <div class="field origin-field">
          <label>출발공항 Filter</label>
          <input id="filterOrigin" class="filter-input" type="text" maxlength="4" placeholder="RJTT">
        </div>

        <div class="field destination-field">
          <label>도착공항 Filter</label>
          <input id="filterDestination" class="filter-input" type="text" maxlength="4" placeholder="RKSS">
        </div>

        <div class="actions">
          <button class="btn" id="btnApplyFilter">Filter</button>
          <button class="btn" id="btnClearFilter">Clear</button>
        </div>
      </div>

      <div class="meta">
        <div>공항: <strong id="metaAirport">-</strong></div>
        <div>기간: <strong id="metaPeriod">-</strong></div>
        <div>건수: <strong id="metaCount">0</strong></div>
        <div>상태: <strong id="metaStatus">대기</strong></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-time">TIME(Local)</th>
              <th class="col-dir">DEP/ARR</th>
              <th class="col-airline">항공사</th>
              <th class="col-flight">편명</th>
              <th class="col-acft">기재</th>
              <th class="col-org">출발공항</th>
              <th class="col-dst">도착공항</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="empty">조회 결과가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-xe1RrcCX96iAE-X4eq7AABwfsHVEvHu87_U_2wZtkU-O50QIFleAQGxhuDewecZT/exec';

    let allRows = [];
    let currentFilter = 'ALL';
    let airportFilters = {
      origin: '',
      destination: ''
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(text, type = '') {
      const el = $('metaStatus');
      el.textContent = text;
      el.className = '';
      if (type === 'error') el.classList.add('status-error');
      if (type === 'ok') el.classList.add('status-ok');
    }

    function populateTimeSelect(selectEl, defaultValue) {
      const times = [];
      for (let h = 0; h < 24; h++) {
        const hh = String(h).padStart(2, '0');
        times.push(`${hh}:00`);
      }
      times.push('23:59');
      selectEl.innerHTML = times.map(t => `<option value="${t}">${t}</option>`).join('');
      selectEl.value = defaultValue;
    }

    function getFilteredRows() {
      let rows = [...allRows];

      if (currentFilter === 'DEP') rows = rows.filter(r => r.depArr === 'DEP');
      else if (currentFilter === 'ARR') rows = rows.filter(r => r.depArr === 'ARR');

      if (airportFilters.origin) {
        rows = rows.filter(r => String(r.origin || '').toUpperCase() === airportFilters.origin);
      }

      if (airportFilters.destination) {
        rows = rows.filter(r => String(r.destination || '').toUpperCase() === airportFilters.destination);
      }

      return rows;
    }

    function renderRows() {
      const tbody = $('tbody');
      const rows = getFilteredRows();

      $('metaCount').textContent = rows.length;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty">조회 결과가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td class="col-time">${escapeHtml(r.timeLocal || '')}</td>
          <td class="col-dir"><span class="tag ${r.depArr === 'DEP' ? 'dep' : 'arr'}">${escapeHtml(r.depArr || '')}</span></td>
          <td class="col-airline">${escapeHtml(r.airline || '')}</td>
          <td class="col-flight">${escapeHtml(r.flightNumber || '')}</td>
          <td class="col-acft">${escapeHtml(r.aircraft || '')}</td>
          <td class="col-org">${escapeHtml(r.origin || '')}</td>
          <td class="col-dst">${escapeHtml(r.destination || '')}</td>
        </tr>
      `).join('');
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.async = true;

        script.onerror = () => {
          cleanup();
          reject(new Error('JSONP load failed.'));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Request timeout.'));
        }, 60000);

        function cleanup() {
          clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
        }

        document.body.appendChild(script);
      });
    }

    function formatYmd(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function setDefaultDateTimes() {
      const today = formatYmd(new Date());
      $('startDate').value = today;
      $('endDate').value = today;
      $('startTime').value = '06:00';
      $('endTime').value = '23:59';
    }

    function syncEndWithStartDate() {
      $('endDate').value = $('startDate').value;
      $('endTime').value = '23:59';
    }

    function getStartValue() {
      return `${$('startDate').value}T${$('startTime').value}`;
    }

    function getEndValue() {
      return `${$('endDate').value}T${$('endTime').value}`;
    }

    function applyAirportFilter() {
      airportFilters.origin = $('filterOrigin').value.trim().toUpperCase();
      airportFilters.destination = $('filterDestination').value.trim().toUpperCase();
      renderRows();
    }

    function clearAirportFilter() {
      $('filterOrigin').value = '';
      $('filterDestination').value = '';
      airportFilters.origin = '';
      airportFilters.destination = '';
      renderRows();
    }

    async function searchSchedule() {
      const airport = $('airport').value.trim().toUpperCase();
      const start = getStartValue();
      const end = getEndValue();

      if (!airport) {
        alert('공항 ICAO 코드를 입력해주세요.');
        return;
      }
      if (!$('startDate').value || !$('endDate').value) {
        alert('시작/종료 날짜를 입력해주세요.');
        return;
      }
      if (end <= start) {
        alert('종료시간은 시작시간보다 나중이어야 합니다.');
        return;
      }

      setStatus('조회 중...');
      $('metaAirport').textContent = airport;
      $('metaPeriod').textContent = `${start} ~ ${end}`;

      const url =
        APPS_SCRIPT_URL +
        '?action=schedule' +
        '&airport=' + encodeURIComponent(airport) +
        '&start=' + encodeURIComponent(start) +
        '&end=' + encodeURIComponent(end);

      try {
        const data = await jsonp(url);

        if (!data || !data.ok) {
          throw new Error((data && data.error) || 'Unknown error');
        }

        allRows = Array.isArray(data.rows) ? data.rows : [];
        currentFilter = 'ALL';
        renderRows();
        setStatus(getFilteredRows().length === 0 ? '정상 (0건)' : '정상', 'ok');

      } catch (err) {
        allRows = [];
        renderRows();
        setStatus('오류: ' + (err.message || err), 'error');
      }
    }

    $('btnSearch').addEventListener('click', searchSchedule);
    $('btnAll').addEventListener('click', () => { currentFilter = 'ALL'; renderRows(); });
    $('btnDep').addEventListener('click', () => { currentFilter = 'DEP'; renderRows(); });
    $('btnArr').addEventListener('click', () => { currentFilter = 'ARR'; renderRows(); });
    $('btnApplyFilter').addEventListener('click', applyAirportFilter);
    $('btnClearFilter').addEventListener('click', clearAirportFilter);

    $('airport').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterOrigin').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterDestination').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterOrigin').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyAirportFilter();
    });

    $('filterDestination').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyAirportFilter();
    });

    $('startDate').addEventListener('change', syncEndWithStartDate);
    $('startTime').addEventListener('change', syncEndWithStartDate);

    populateTimeSelect($('startTime'), '06:00');
    populateTimeSelect($('endTime'), '23:59');
    setDefaultDateTimes();
    renderRows();
  </script>
</body>
</html>
