<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Airport Schedule Search</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#d7e0ea;
      --text:#1f2d3d;
      --muted:#6b7c93;
      --blue:#4a6fa5;
      --blue-dark:#395782;
      --yellow:#fff55a;
      --btn:#7c8794;
      --btn-dark:#5f6974;
      --dep:#dbeafe;
      --arr:#dcfce7;
      --shadow:0 8px 24px rgba(15,23,42,.08);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:14px auto;
      padding:0 6px;
    }

    .toolbar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px;
      margin-bottom:12px;
    }

    .toolbar-grid{
      display:grid;
      grid-template-columns: 140px 250px 250px auto;
      gap:8px;
      align-items:end;
    }

    .filter-grid{
      display:grid;
      grid-template-columns: 120px 120px auto;
      gap:8px;
      align-items:end;
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed var(--line);
    }

    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
      line-height:1.2;
      min-height:14px;
    }

    .field input,
    .field select{
      width:100%;
      height:36px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 8px;
      font-size:13px;
      background:#fff;
    }

    .field input.airport{
      background:var(--yellow);
      font-weight:700;
      text-transform:uppercase;
    }

    .dt-row{
      display:grid;
      grid-template-columns: 1fr 86px;
      gap:6px;
      align-items:center;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      height:36px;
      padding:0 12px;
      border:none;
      border-radius:10px;
      background:var(--btn);
      color:#fff;
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      box-shadow:0 2px 0 rgba(0,0,0,.18);
      white-space:nowrap;
    }

    .btn:hover{background:var(--btn-dark)}
    .btn-primary{background:var(--blue);}
    .btn-primary:hover{background:var(--blue-dark);}

    .meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }

    .table-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .table-wrap{
      overflow:auto;
      max-height:78vh;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:640px;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#eef3f8;
      border-bottom:1px solid var(--line);
      padding:6px 4px;
      text-align:center;
      font-size:11px;
      white-space:nowrap;
      line-height:1.15;
    }

    tbody td{
      border-bottom:1px solid #edf2f7;
      padding:5px 4px;
      font-size:11px;
      white-space:nowrap;
      text-align:center;
      line-height:1.15;
    }

    tbody tr:hover{
      background:#f8fbff;
    }

    .tag{
      display:inline-block;
      min-width:38px;
      padding:2px 6px;
      border-radius:999px;
      font-size:10px;
      font-weight:700;
    }

    .tag.dep{ background:var(--dep); color:#1d4ed8; }
    .tag.arr{ background:var(--arr); color:#15803d; }

    .empty{
      padding:24px 10px;
      text-align:center;
      color:var(--muted);
    }

    .status-error{
      color:#b91c1c;
      font-weight:700;
    }

    .status-ok{
      color:#166534;
      font-weight:700;
    }

    .col-time{min-width:88px;}
    .col-dir{min-width:48px;}
    .col-airline{min-width:70px;}
    .col-flight{min-width:56px;}
    .col-acft{min-width:68px;}
    .col-org{min-width:54px;}
    .col-dst{min-width:54px;}

    @media (max-width: 980px){
      .toolbar-grid,
      .filter-grid{
        grid-template-columns: 1fr;
      }

      .actions{
        width:100%;
      }

      .btn{
        flex:1 1 auto;
      }

      .wrap{
        padding:0 4px;
      }

      .toolbar{
        padding:9px;
      }

      table{
        min-width:560px;
      }

      thead th{
        padding:5px 3px;
        font-size:10px;
      }

      tbody td{
        padding:4px 3px;
        font-size:10px;
      }

      .tag{
        min-width:34px;
        padding:2px 5px;
        font-size:9px;
      }

      .col-time{min-width:80px;}
      .col-dir{min-width:42px;}
      .col-airline{min-width:58px;}
      .col-flight{min-width:50px;}
      .col-acft{min-width:58px;}
      .col-org{min-width:48px;}
      .col-dst{min-width:48px;}
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="toolbar">
      <div class="toolbar-grid">
        <div class="field">
          <label>공항(ICAO)</label>
          <input id="airport" class="airport" type="text" value="RJTT" maxlength="4" placeholder="RJTT">
        </div>

        <div class="field">
          <label>START (LOCAL)</label>
          <div class="dt-row">
            <input id="startDate" type="date">
            <select id="startTime"></select>
          </div>
        </div>

        <div class="field">
          <label>END (LOCAL)</label>
          <div class="dt-row">
            <input id="endDate" type="date">
            <select id="endTime"></select>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btnSearch">스케줄 조회</button>
          <button class="btn" id="btnAll">전체</button>
          <button class="btn" id="btnDep">DEP</button>
          <button class="btn" id="btnArr">ARR</button>
        </div>
      </div>

      <div class="filter-grid">
        <div class="field">
          <label>출발공항 Filter</label>
          <input id="filterOrigin" type="text" maxlength="4" placeholder="RJTT">
        </div>

        <div class="field">
          <label>도착공항 Filter</label>
          <input id="filterDestination" type="text" maxlength="4" placeholder="RKSS">
        </div>

        <div class="actions">
          <button class="btn" id="btnApplyFilter">Filter</button>
          <button class="btn" id="btnClearFilter">Clear</button>
        </div>
      </div>

      <div class="meta">
        <div>공항: <strong id="metaAirport">-</strong></div>
        <div>기간: <strong id="metaPeriod">-</strong></div>
        <div>건수: <strong id="metaCount">0</strong></div>
        <div>상태: <strong id="metaStatus">대기</strong></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-time">TIME(UTC)</th>
              <th class="col-dir">DEP/ARR</th>
              <th class="col-airline">항공사</th>
              <th class="col-flight">편명</th>
              <th class="col-acft">기재</th>
              <th class="col-org">출발공항</th>
              <th class="col-dst">도착공항</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="empty">조회 결과가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFbAdnUVyctPPIDkPtgg6l4Jwfv0NxUAeEleSeRImlbZy-3-xJ4hqY8n5I4Cqs4vf9/exec';

    let allRows = [];
    let currentFilter = 'ALL';
    let airportFilters = {
      origin: '',
      destination: ''
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(text, type = '') {
      const el = $('metaStatus');
      el.textContent = text;
      el.className = '';
      if (type === 'error') el.classList.add('status-error');
      if (type === 'ok') el.classList.add('status-ok');
    }

    function populateTimeSelect(selectEl, defaultValue) {
      const times = [];
      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m++) {
          if (m !== 0 && m !== 59) continue;
          const hh = String(h).padStart(2, '0');
          const mm = String(m).padStart(2, '0');
          times.push(`${hh}:${mm}`);
        }
      }

      selectEl.innerHTML = times.map(t => `<option value="${t}">${t}</option>`).join('');
      selectEl.value = defaultValue;
    }

    function getFilteredRows() {
      let rows = [...allRows];

      if (currentFilter === 'DEP') {
        rows = rows.filter(r => r.depArr === 'DEP');
      } else if (currentFilter === 'ARR') {
        rows = rows.filter(r => r.depArr === 'ARR');
      }

      if (airportFilters.origin) {
        rows = rows.filter(r => String(r.origin || '').toUpperCase() === airportFilters.origin);
      }

      if (airportFilters.destination) {
        rows = rows.filter(r => String(r.destination || '').toUpperCase() === airportFilters.destination);
      }

      return rows;
    }

    function renderRows() {
      const tbody = $('tbody');
      const rows = getFilteredRows();

      $('metaCount').textContent = rows.length;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty">조회 결과가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td class="col-time">${escapeHtml(r.timeUtc || '')}</td>
          <td class="col-dir">
            <span class="tag ${r.depArr === 'DEP' ? 'dep' : 'arr'}">${escapeHtml(r.depArr || '')}</span>
          </td>
          <td class="col-airline">${escapeHtml(r.airline || '')}</td>
          <td class="col-flight">${escapeHtml(r.flightNumber || '')}</td>
          <td class="col-acft">${escapeHtml(r.aircraft || '')}</td>
          <td class="col-org">${escapeHtml(r.origin || '')}</td>
          <td class="col-dst">${escapeHtml(r.destination || '')}</td>
        </tr>
      `).join('');
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.async = true;

        script.onerror = () => {
          cleanup();
          reject(new Error('JSONP load failed.'));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Request timeout.'));
        }, 60000);

        function cleanup() {
          clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
        }

        document.body.appendChild(script);
      });
    }

    function formatYmd(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function setDefaultDateTimes() {
      const today = formatYmd(new Date());
      $('startDate').value = today;
      $('endDate').value = today;
      $('startTime').value = '06:00';
      $('endTime').value = '23:59';
    }

    function syncEndWithStartDate() {
      $('endDate').value = $('startDate').value;
      $('endTime').value = '23:59';
    }

    function getStartValue() {
      return `${$('startDate').value}T${$('startTime').value}`;
    }

    function getEndValue() {
      return `${$('endDate').value}T${$('endTime').value}`;
    }

    function applyAirportFilter() {
      airportFilters.origin = $('filterOrigin').value.trim().toUpperCase();
      airportFilters.destination = $('filterDestination').value.trim().toUpperCase();
      renderRows();
    }

    function clearAirportFilter() {
      $('filterOrigin').value = '';
      $('filterDestination').value = '';
      airportFilters.origin = '';
      airportFilters.destination = '';
      renderRows();
    }

    async function searchSchedule() {
      const airport = $('airport').value.trim().toUpperCase();
      const start = getStartValue();
      const end = getEndValue();

      if (!airport) {
        alert('공항 ICAO 코드를 입력해주세요.');
        return;
      }
      if (!$('startDate').value || !$('endDate').value) {
        alert('시작/종료 날짜를 입력해주세요.');
        return;
      }
      if (end <= start) {
        alert('종료시간은 시작시간보다 나중이어야 합니다.');
        return;
      }
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
        alert('APPS_SCRIPT_URL을 실제 웹앱 URL로 바꿔주세요.');
        return;
      }

      setStatus('조회 중...');
      $('metaAirport').textContent = airport;
      $('metaPeriod').textContent = `${start} ~ ${end}`;

      const url =
        APPS_SCRIPT_URL +
        '?action=schedule' +
        '&airport=' + encodeURIComponent(airport) +
        '&start=' + encodeURIComponent(start) +
        '&end=' + encodeURIComponent(end);

      try {
        const data = await jsonp(url);

        if (!data || !data.ok) {
          throw new Error((data && data.error) || 'Unknown error');
        }

        allRows = Array.isArray(data.rows) ? data.rows : [];
        currentFilter = 'ALL';
        renderRows();

        if (getFilteredRows().length === 0) {
          setStatus('정상 (0건)', 'ok');
        } else {
          setStatus('정상', 'ok');
        }

      } catch (err) {
        allRows = [];
        renderRows();
        setStatus('오류: ' + (err.message || err), 'error');
      }
    }

    $('btnSearch').addEventListener('click', searchSchedule);

    $('btnAll').addEventListener('click', () => {
      currentFilter = 'ALL';
      renderRows();
    });

    $('btnDep').addEventListener('click', () => {
      currentFilter = 'DEP';
      renderRows();
    });

    $('btnArr').addEventListener('click', () => {
      currentFilter = 'ARR';
      renderRows();
    });

    $('btnApplyFilter').addEventListener('click', applyAirportFilter);
    $('btnClearFilter').addEventListener('click', clearAirportFilter);

    $('airport').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterOrigin').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterDestination').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
    });

    $('filterOrigin').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyAirportFilter();
    });

    $('filterDestination').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyAirportFilter();
    });

    $('startDate').addEventListener('change', syncEndWithStartDate);
    $('startTime').addEventListener('change', syncEndWithStartDate);

    populateTimeSelect($('startTime'), '06:00');
    populateTimeSelect($('endTime'), '23:59');
    setDefaultDateTimes();
    renderRows();
  </script>
</body>
</html>
